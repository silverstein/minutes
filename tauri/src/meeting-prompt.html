<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upcoming Meeting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #1c1c1e;
      color: #f5f5f7;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-user-select: none;
      user-select: none;
      border: 1px solid #38383a;
      border-radius: 10px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .meeting-info {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .calendar-icon {
      font-size: 16px;
      line-height: 1.3;
      flex-shrink: 0;
    }

    .meeting-text {
      min-width: 0;
    }

    .meeting-title {
      font-size: 15px;
      font-weight: 600;
      color: #f5f5f7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .meeting-countdown {
      font-size: 13px;
      color: #6391b3;
      margin-top: 2px;
    }

    .meeting-countdown.urgent {
      color: #e5534b;
    }

    .close-btn {
      padding: 2px 8px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #636366;
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }

    .close-btn:hover { color: #98989d; background: #38383a; }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s ease;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: #6391b3;
      color: #fff;
      flex: 1;
    }

    .btn-primary:hover { background: #7ba3c0; }
    .btn-primary:active { background: #4d7a99; transform: scale(0.97); }
    .btn-primary:disabled { background: #38383a; color: #636366; cursor: default; transform: none; }

    .btn-secondary {
      background: transparent;
      color: #98989d;
      border: 1px solid #38383a;
    }

    .btn-secondary:hover { background: #38383a; color: #f5f5f7; }
    .btn-secondary:active { transform: scale(0.97); }

    .error-text {
      font-size: 12px;
      color: #e5534b;
      margin-top: 8px;
      display: none;
    }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: #46c072;
      color: #000;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Slide-in animation */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      animation: slideIn 300ms ease-out;
    }
  </style>
</head>
<body role="alertdialog" aria-label="Upcoming meeting">
  <div class="header">
    <div class="meeting-info">
      <span class="calendar-icon">📅</span>
      <div class="meeting-text">
        <div class="meeting-title" id="title"></div>
        <div class="meeting-countdown" id="countdown"></div>
      </div>
    </div>
    <button class="close-btn" id="close-btn" aria-label="Dismiss">✕</button>
  </div>
  <div class="actions">
    <button class="btn btn-primary" id="primary-btn" autofocus></button>
    <button class="btn btn-secondary" id="dismiss-btn">Dismiss</button>
  </div>
  <div class="error-text" id="error-text"></div>
  <div class="toast" id="toast">Recording started ✓</div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;

    // Parse event data from URL fragment: title|minutesUntil|url
    const fragment = decodeURIComponent(window.location.hash.slice(1));
    const [title, minutesStr, meetingUrl] = fragment.split('|');
    const minutesUntil = parseInt(minutesStr, 10) || 0;
    const hasUrl = meetingUrl && meetingUrl.length > 0 && meetingUrl !== 'undefined';

    // Set content
    const titleEl = document.getElementById('title');
    const countdownEl = document.getElementById('countdown');
    const primaryBtn = document.getElementById('primary-btn');
    const errorEl = document.getElementById('error-text');
    const toast = document.getElementById('toast');

    titleEl.textContent = title || 'Meeting';
    titleEl.title = title || 'Meeting'; // full text on hover

    if (minutesUntil <= 0) {
      countdownEl.textContent = 'starting now';
      countdownEl.classList.add('urgent');
    } else if (minutesUntil === 1) {
      countdownEl.textContent = 'in 1 minute';
    } else {
      countdownEl.textContent = `in ${minutesUntil} minutes`;
    }

    primaryBtn.textContent = hasUrl ? 'Join & Record' : 'Record';

    // Auto-focus primary button
    primaryBtn.focus();

    // Actions
    async function startRecording() {
      primaryBtn.disabled = true;
      primaryBtn.textContent = 'Starting...';

      try {
        // Open meeting URL first if available
        if (hasUrl) {
          await invoke('cmd_open_meeting_url', { url: meetingUrl });
        }

        // Start recording
        await invoke('cmd_start_recording');

        // Success toast
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => getCurrentWebviewWindow().close(), 200);
        }, 600);
      } catch (e) {
        primaryBtn.disabled = false;
        primaryBtn.textContent = hasUrl ? 'Join & Record' : 'Record';
        errorEl.textContent = String(e);
        errorEl.style.display = 'block';
      }
    }

    function dismiss() {
      getCurrentWebviewWindow().close();
    }

    primaryBtn.addEventListener('click', startRecording);
    document.getElementById('dismiss-btn').addEventListener('click', dismiss);
    document.getElementById('close-btn').addEventListener('click', dismiss);

    // Keyboard: Escape to dismiss
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') dismiss();
    });

    // Auto-dismiss after 60 seconds
    setTimeout(() => {
      document.body.style.transition = 'opacity 300ms ease-out';
      document.body.style.opacity = '0';
      setTimeout(() => getCurrentWebviewWindow().close(), 300);
    }, 60000);
  </script>
</body>
</html>
