name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Detect which areas of the repo changed so heavy Rust/Tauri jobs can
  # skip when a PR only touches docs, site/, MCP, skills, or scripts.
  # The Windows Desktop Installer job alone is ~20 min; on a no-Rust PR
  # that's pure waste. Any path touched by the `rust` filter triggers the
  # full desktop/test/install matrix. The workflow file itself is in the
  # filter defensively, so edits to CI always get verified end-to-end.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'tauri/**'
              - 'crates/core/**'
              - 'crates/cli/**'
              - 'crates/reader/**'
              - 'crates/whisper-guard/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install audio dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpipewire-0.3-dev libspa-0.2-dev

      - name: Set CXXFLAGS for whisper.cpp (macOS)
        if: runner.os == 'macOS'
        run: echo "CXXFLAGS=-I$(xcrun --show-sdk-path)/usr/include/c++/v1" >> "$GITHUB_ENV"

      # Scope every cache to the exact runner image (ImageOS + ImageVersion).
      # When `macos-latest` rotated from macOS 15 to macOS 26 the old target/ cache
      # was restored onto the new image and the linker pulled
      # `-L .../Xcode_16.4.app/.../clang/17/lib/darwin` (absent on macOS 26) ->
      # "clang_rt.osx not found". We key on BOTH ImageOS and ImageVersion because
      # ImageOS alone misses within-family bumps (e.g. macos26 swapping Xcode 26.4
      # -> 26.5 on a weekly image update), which would re-poison compiled target/.
      #
      # ImageOS / ImageVersion are runner-injected env vars, NOT part of the
      # ${{ env }} context (which only holds vars set via `env:` blocks), so the old
      # `${{ env.ImageOS }}` key silently expanded to empty and never scoped anything.
      # We compute the scope in a step and read it back as a step output below.
      - name: Resolve runner image for cache scope
        id: runner-image
        shell: bash
        run: echo "scope=${ImageOS:-noimage}-${ImageVersion:-noversion}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ steps.runner-image.outputs.scope }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build core (no whisper)
        run: cargo build -p minutes-core --no-default-features

      - name: Build copilot core + CLI (cross-platform)
        # PR #9 gate: compiles the local-socket transport as a Unix domain
        # socket on macOS/Linux and a named pipe on Windows, together with the
        # CLI attachment and measured model router.
        run: cargo build -p minutes-core -p minutes-cli --no-default-features

      - name: Build core with diarization (cross-platform)
        run: cargo build -p minutes-core --no-default-features --features diarize

      - name: Build core with streaming only (downstream consumer path)
        # Catches cfg gating regressions where streaming-only modules
        # (streaming_whisper, dictation, live_transcript) accidentally require
        # whisper. Prompter is the canonical downstream consumer of this
        # feature combo — it enables `streaming` for AudioStream + Vad but
        # does its own whisper via whisper-rs directly. Without this step,
        # breakage here only surfaces when Prompter next runs cargo build.
        run: cargo build -p minutes-core --no-default-features --features streaming

      - name: Build core with parakeet (cross-platform)
        # Guards against Linux-parakeet breakage that today only surfaces
        # at tag push via release-cli.yml. The parakeet feature compiles
        # on Unix (subprocess + optional sidecar via cfg all(parakeet,unix))
        # and as a no-op stub elsewhere. Without this step, a feature-gated
        # compile error in parakeet_sidecar or related code stays invisible
        # on non-macOS until release.
        run: cargo build -p minutes-core --no-default-features --features parakeet

      - name: Ensure cmake for sherpa-rs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Build core with sherpa engine (all platforms)
        # Opt-in sherpa-onnx engine (engine-sherpa). sherpa-rs-sys cmake-builds
        # sherpa-onnx in-process. Now exercised on macOS + Linux + Windows so the
        # cross-platform build is a verified gate for making sherpa the default
        # (Windows runners ship cmake + MSVC). Catches engine-gated breakage that
        # otherwise only surfaces at release, and exercises Linux beyond no-default-features.
        run: cargo build -p minutes-core --no-default-features --features engine-sherpa

      - name: Build full workspace (macOS only)
        if: runner.os == 'macOS'
        run: cargo build --no-default-features

      - name: Unit tests (no whisper)
        run: cargo test -p minutes-core --no-default-features --lib -- --test-threads=1
        timeout-minutes: 3

      - name: Copilot attach, routing, and window-contract tests
        # On Windows this executes the real named-pipe connect/reconnect path.
        # On Unix it also asserts owner-only socket/discovery permissions.
        run: "cargo test -p minutes-core --no-default-features --lib copilot:: -- --test-threads=1"
        timeout-minutes: 4

      - name: Copilot CLI contract tests
        run: cargo test -p minutes-cli --no-default-features -- copilot --test-threads=1
        timeout-minutes: 4

      - name: Diarization unit tests (cross-platform)
        run: cargo test -p minutes-core --no-default-features --features diarize --lib -- diarize --test-threads=1
        timeout-minutes: 3

      - name: Integration tests (no whisper, macOS only)
        if: runner.os == 'macOS'
        run: cargo test -p minutes-core --no-default-features --test integration -- --test-threads=1
        timeout-minutes: 10
        continue-on-error: true

      - name: Clippy (macOS only — full workspace)
        if: runner.os == 'macOS'
        run: cargo clippy --all --no-default-features -- -D warnings

      - name: Format check (macOS only)
        if: runner.os == 'macOS'
        run: cargo fmt --all -- --check

      - name: Check desktop capture-relay integration (macOS)
        if: runner.os == 'macOS'
        run: cargo check -p minutes-app --tests

  install:
    name: Install CLI (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install audio dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpipewire-0.3-dev libspa-0.2-dev

      # Per-image cache scope (ImageOS + ImageVersion); see the test job comment.
      # These are runner-injected vars absent from the ${{ env }} context, so we
      # expose the value as a step output for the cache key below.
      - name: Resolve runner image for cache scope
        id: runner-image
        shell: bash
        run: echo "scope=${ImageOS:-noimage}-${ImageVersion:-noversion}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ steps.runner-image.outputs.scope }}-install-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo install minutes-cli (no whisper)
        run: cargo install --path crates/cli --no-default-features

      - name: Verify minutes --help
        run: minutes --help

      - name: Verify minutes --version
        run: minutes --version

  linux_full_build:
    # Catches whisper+Linux regressions at PR time instead of waiting for the
    # release-cli.yml workflow at tag push. Builds the CLI with default features
    # (whisper + diarize) so any libclang / cmake / pipewire-sys / whisper-rs
    # breakage on Linux surfaces here.
    #
    # Uses a debug build (not --release) because optimization-only failures in
    # whisper.cpp / ort / pyannote-rs are vanishingly rare and the time savings
    # (~5 min vs ~15 min cold) compound across every PR. release-cli.yml still
    # does the release build at tag time as the final gate.
    name: Build CLI (ubuntu-latest, default features)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build + audio dev deps
        # ubuntu-latest happens to ship clang preinstalled, but we declare it
        # explicitly so this job stays portable to other Linux runner images.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang libclang-dev \
            cmake build-essential pkg-config \
            libasound2-dev libpipewire-0.3-dev libspa-0.2-dev

      - name: Install Linux desktop check deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Per-image cache scope (ImageOS + ImageVersion); see the test job comment.
      # These are runner-injected vars absent from the ${{ env }} context, so we
      # expose the value as a step output for the cache key below.
      - name: Resolve runner image for cache scope
        id: runner-image
        shell: bash
        run: echo "scope=${ImageOS:-noimage}-${ImageVersion:-noversion}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ steps.runner-image.outputs.scope }}-cli-fullbuild-debug-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI debug (whisper + diarize)
        run: cargo build -p minutes-cli

      - name: Verify binary runs
        run: ./target/debug/minutes --version

      - name: Check Linux desktop capture-relay + window contract
        run: cargo check -p minutes-app --tests

  desktop_windows:
    name: Desktop App Installer (windows-latest)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Per-image cache scope (ImageOS + ImageVersion); see the test job comment.
      # These are runner-injected vars absent from the ${{ env }} context, so we
      # expose the value as a step output for the two cache keys below.
      - name: Resolve runner image for cache scope
        id: runner-image
        shell: bash
        run: echo "scope=${ImageOS:-noimage}-${ImageVersion:-noversion}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ steps.runner-image.outputs.scope }}-desktop-${{ hashFiles('**/Cargo.lock') }}

      - name: Clean stale Windows native build cache
        shell: bash
        run: |
          rm -rf \
            target/debug/build/whisper-rs-sys-* \
            target/release/build/whisper-rs-sys-* \
            target/debug/build/knf-rs-sys-* \
            target/release/build/knf-rs-sys-*

      - name: Cache ONNX Runtime binaries
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/dfbin
          key: ${{ runner.os }}-${{ steps.runner-image.outputs.scope }}-ort-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "2.10.1" --locked

      - name: Check Windows desktop capture-relay + window contract
        # Compiles Tauri's owner side against the Windows named-pipe relay
        # before the slower installer build.
        run: cargo check -p minutes-app --tests

      - name: Build Windows NSIS installer (unsigned)
        working-directory: tauri/src-tauri
        run: cargo tauri build --ci --bundles nsis --no-sign
        env:
          CARGO_NET_RETRY: 3
          # Keep the CI desktop artifact aligned with release builds: AVX2 max,
          # never host-native or AVX-512 from the runner CPU.
          GGML_NATIVE: "OFF"
          GGML_AVX: "ON"
          GGML_AVX2: "ON"
          GGML_AVX512: "OFF"
          GGML_AVX512_VBMI: "OFF"
          GGML_AVX512_VNNI: "OFF"
          GGML_AVX512_BF16: "OFF"

  mcp:
    name: MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install MCP dependencies
        working-directory: crates/mcp
        run: npm ci

      - name: TypeScript check
        working-directory: crates/mcp
        run: npx tsc --noEmit

      - name: MCP capture-relay attach tests
        working-directory: crates/mcp
        run: npx vitest run src/captureRelay.test.ts

      # Regression guard for issue #149: v0.13.0 shipped an MCPB bundle
      # that Claude Desktop 1.3109.0 refused to unzip because the bundle
      # contained Next.js chunks with `..` in their filenames. Pack the
      # bundle on every push, run the static bundle check (forbidden
      # prefixes, `..` paths, required runtime files), and smoke-test the
      # handshake. This class of regression now fails CI before a release
      # can ship it.

      - name: Build MCP server
        working-directory: crates/mcp
        run: npm run build

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Pack MCPB bundle
        run: ./scripts/pack_mcpb.sh minutes.mcpb

      - name: Static bundle check
        run: ./scripts/check_mcpb_bundle.sh minutes.mcpb

      - name: Handshake smoke test
        run: ./scripts/smoke_mcpb_handshake.sh minutes.mcpb

  # The lockfile is generated from a clean tree with Node 22/npm 10 so its v3
  # package graph retains every platform-specific optional dependency.
  mcp_lockfile_check:
    name: MCP Lockfile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install MCP dependencies
        working-directory: crates/mcp
        run: npm ci

      - name: TypeScript check
        working-directory: crates/mcp
        run: npx tsc --noEmit

  version_sync:
    name: Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify version policy
        run: node scripts/check_version_sync.mjs

      - name: Test version policy checker
        run: node --test scripts/check_version_sync.test.mjs

      - name: Test optional Git hook setup
        run: node --test scripts/setup_hooks.test.mjs

      - name: Test transactional version bump
        run: node --test scripts/bump_version.test.mjs

      - name: Test committed release flow
        run: node --test scripts/release.test.mjs

  design_tokens:
    name: Design Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch pull request base baseline
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          if git cat-file -e "$BASE_SHA:design/token-baseline.json"; then
            git show "$BASE_SHA:design/token-baseline.json" > "$RUNNER_TEMP/design-token-base.json"
            echo "DESIGN_TOKEN_BASELINE=$RUNNER_TEMP/design-token-base.json" >> "$GITHUB_ENV"
          fi

      - name: Verify design-token policy
        shell: bash
        run: |
          if [[ -n "${DESIGN_TOKEN_BASELINE:-}" ]]; then
            node scripts/check_design_tokens.mjs --base-baseline "$DESIGN_TOKEN_BASELINE"
          else
            node scripts/check_design_tokens.mjs
          fi

      - name: Test design-token checker
        run: node --test scripts/check_design_tokens.test.mjs

  skills_compiler:
    name: Skills Compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install skill compiler dependencies
        working-directory: tooling/skills
        run: npm ci

      - name: Verify canonical skills and generated mirrors
        working-directory: tooling/skills
        run: npm run ci

  site_release_consistency:
    name: Site Release Link Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify site release constants match manifest
        run: node scripts/sync_site_release_version.mjs --check

  agents_sync:
    name: Agents Skill Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify .agents/ mirrors .claude/plugins/minutes/
        run: ./scripts/check-agents-sync.sh

  llms_sync:
    name: Agent Docs (llms.txt) Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify llms.txt and related agent docs are in sync with sources
        run: node scripts/generate_llms_txt.mjs --check

  live_sidekick_eval:
    name: Live Sidekick Privacy and Behavior Evals
    # Intentionally independent of the Rust path filter. A fixture-, schema-,
    # privacy-, or runner-only PR must not be able to skip this gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Public fixture privacy gate
        run: python3 scripts/check_live_sidekick_fixture_privacy.py

      - name: Privacy and schema negative controls
        run: >-
          python3 -m unittest
          tests/eval/test_live_sidekick_fixture_privacy.py
          tests/eval/test_live_sidekick_fixture_schema.py

      - name: Validate versioned fixture schema and execution classifications
        run: python3 tests/eval/live_sidekick_fixture_schema.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and build canonical skill router
        working-directory: tooling/skills
        run: |
          npm ci
          npm run build

      - name: Replay routing fixture twice through canonical router
        run: node tests/eval/live_sidekick_routing_eval.mjs

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install audio dev headers (Linux)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpipewire-0.3-dev libspa-0.2-dev

      - name: Replay executable fixtures twice through actual core reducer
        run: cargo test -p minutes-core --no-default-features --test live_sidekick_eval -- --test-threads=1
        timeout-minutes: 8

  # Single aggregator gate, intended to be the ONLY required status check in
  # branch protection. The Rust matrix jobs (test / install / linux_full_build /
  # desktop_windows) are gated by `needs.changes.outputs.rust == 'true'`, so on a
  # docs/site/MCP-only PR they are SKIPPED. GitHub treats a required-but-skipped
  # check as unmet, which left non-Rust PRs permanently BLOCKED (an outside
  # contributor could not merge them at all; the maintainer had to admin-merge).
  #
  # This job depends on every job whose check used to be individually required,
  # runs with `if: always()`, and fails only if one of them actually FAILED or
  # was CANCELLED. A `skipped` result (the path filter doing its job) passes the
  # gate. So: required Rust jobs that ran must be green; required jobs the filter
  # correctly skipped do not block. Point branch protection at "CI Gate" alone.
  ci_gate:
    name: CI Gate
    needs:
      - changes
      - test
      - install
      - linux_full_build
      - desktop_windows
      - mcp
      - mcp_lockfile_check
      - version_sync
      - design_tokens
      - skills_compiler
      - agents_sync
      - site_release_consistency
      - llms_sync
      - live_sidekick_eval
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "Upstream job results: ${{ join(needs.*.result, ', ') }}"
          echo "A required CI job failed or was cancelled."
          exit 1

      - name: Report success
        run: |
          echo "All required CI jobs passed or were legitimately skipped."
          echo "Upstream job results: ${{ join(needs.*.result, ', ') }}"
