name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  CXXFLAGS: -I$(xcrun --show-sdk-path)/usr/include/c++/v1
  TAURI_CLI_VERSION: "2.10.1"

jobs:
  macos-release:
    name: Build signed + notarized Minutes.app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set C++ include path for whisper.cpp
        run: echo "CXXFLAGS=-I$(xcrun --show-sdk-path)/usr/include/c++/v1" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "${TAURI_CLI_VERSION}" --locked

      - name: Validate signing and notarization secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required release secrets: ${missing[*]}" >&2
            echo "See docs/RELEASE-MACOS.md for the expected values." >&2
            exit 1
          fi

      - name: Materialize App Store Connect key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build signed + notarized bundle (with updater artifacts)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --bundles app,dmg

      - name: Upload signed app bundle
        uses: actions/upload-artifact@v4
        with:
          name: minutes-macos-app
          path: target/release/bundle/macos/Minutes.app
          if-no-files-found: error

      - name: Upload signed dmg
        uses: actions/upload-artifact@v4
        with:
          name: minutes-macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Verify release exists before uploading assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null

      - name: Generate latest.json for auto-updater
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SIG=$(cat target/release/bundle/macos/Minutes.app.tar.gz.sig)
          if [ -z "$SIG" ]; then
            echo "ERROR: .sig file empty or missing" >&2
            exit 1
          fi
          URL="https://github.com/silverstein/minutes/releases/download/${GITHUB_REF_NAME}/Minutes.app.tar.gz"
          NOTES=$(gh release view "${GITHUB_REF_NAME}" --json body -q .body 2>/dev/null || echo "")
          export UPDATE_VERSION="$VERSION"
          export UPDATE_SIG="$SIG"
          export UPDATE_URL="$URL"
          export UPDATE_NOTES="$NOTES"
          python3 << 'PYEOF'
          import json, os, datetime
          data = {
              "version": os.environ["UPDATE_VERSION"],
              "notes": os.environ["UPDATE_NOTES"],
              "pub_date": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  "darwin-aarch64": {
                      "signature": os.environ["UPDATE_SIG"].strip(),
                      "url": os.environ["UPDATE_URL"]
                  }
              }
          }
          with open("target/release/bundle/macos/latest.json", "w") as f:
              json.dump(data, f, indent=2)
          PYEOF

      - name: Upload release assets to existing tag release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            target/release/bundle/dmg/*.dmg \
            target/release/bundle/macos/Minutes.app.tar.gz \
            target/release/bundle/macos/Minutes.app.tar.gz.sig \
            target/release/bundle/macos/latest.json \
            --clobber
