<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minutes Sidekick</title>
  <script src="scripts/ui-zoom.js"></script>
  <link rel="stylesheet" href="styles/ui-zoom-tokens.css">
  <style>
    @font-face { font-family: Geist; src: url('fonts/Geist-Regular.woff2') format('woff2'); font-weight: 400; }
    @font-face { font-family: Geist; src: url('fonts/Geist-Medium.woff2') format('woff2'); font-weight: 600; }
    @font-face { font-family: 'Geist Mono'; src: url('fonts/GeistMono-Regular.woff2') format('woff2'); }
    * { box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #11110f; --panel: #181815; --raised: #20201c; --line: rgba(245,241,231,.12);
      --text: #f4f0e7; --muted: #aaa49a; --accent: #78dc8d; --blue: #8fc5e8;
    }
    @media (prefers-color-scheme: light) {
      :root { color-scheme: light; --bg: #f4f0e8; --panel: #fbf8f2; --raised: #eee9df; --line: rgba(26,25,22,.13); --text: #1b1a17; --muted: #6a655d; --accent: #306b3f; --blue: #315f7b; }
    }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: Geist, -apple-system, sans-serif; }
    body { display: grid; grid-template-rows: auto minmax(0,1fr) auto; }
    header { display: grid; grid-template-columns: minmax(0,1fr) auto; align-items: center; gap: 12px; padding: 18px 20px 14px; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--panel) 94%, transparent); }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .mark { display: flex; align-items: end; gap: 2px; width: 30px; height: 30px; padding: 7px; border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent); border-radius: 10px 10px 7px 7px; background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .mark i { width: 3px; border-radius: 3px; background: var(--accent); }
    .mark i:nth-child(1) { height: 7px; opacity: .55; } .mark i:nth-child(2) { height: 14px; } .mark i:nth-child(3) { height: 10px; opacity: .75; }
    h1 { margin: 0; font-size: 17px; letter-spacing: -.02em; }
    .meta { display: flex; align-items: center; gap: 7px; min-width: 0; margin-top: 3px; color: var(--muted); font: 11px 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: .045em; }
    .dot { width: 6px; height: 6px; flex: 0 0 auto; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 13%, transparent); }
    [data-state="thinking"] .dot, [data-state="arming"] .dot { background: var(--blue); animation: pulse 1.2s ease-in-out infinite; }
    [data-state="degraded"] .dot { background: #f09187; }
    @keyframes pulse { 50% { opacity: .35; transform: scale(.8); } }
    .provider { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    button { border: 1px solid var(--line); background: transparent; color: var(--muted); border-radius: 999px; min-height: 32px; padding: 0 12px; cursor: pointer; font: 600 12px Geist, sans-serif; }
    button:hover { color: var(--text); background: color-mix(in srgb, var(--raised) 70%, transparent); }
    main { overflow-y: auto; padding: 22px 20px 28px; scroll-behavior: smooth; }
    .empty { min-height: 100%; display: grid; place-content: center; text-align: center; color: var(--muted); padding: 30px; }
    .empty strong { display: block; margin-bottom: 7px; color: var(--text); font-size: 20px; letter-spacing: -.025em; }
    .empty span { max-width: 370px; font-size: 14px; line-height: 1.5; }
    .stream { display: flex; flex-direction: column; gap: 15px; }
    .message { max-width: 91%; animation: arrive 180ms ease-out both; }
    .message.user { align-self: flex-end; }
    .message.sidekick { align-self: flex-start; }
    @keyframes arrive { from { opacity: 0; transform: translateY(5px); } }
    .label { margin: 0 0 5px 4px; color: var(--muted); font: 10px 'Geist Mono', monospace; letter-spacing: .05em; text-transform: uppercase; }
    .bubble { padding: 12px 14px; border: 1px solid var(--line); border-radius: 16px 16px 7px 16px; background: var(--raised); font-size: 15px; line-height: 1.45; white-space: pre-wrap; }
    .sidekick .bubble { border-radius: 16px 16px 16px 7px; background: color-mix(in srgb, var(--accent) 7%, var(--panel)); }
    .foot { margin: 5px 4px 0; color: var(--muted); font: 10px 'Geist Mono', monospace; }
    footer { padding: 12px 16px 16px; border-top: 1px solid var(--line); background: var(--panel); }
    .status-row { min-height: 25px; margin: 0 5px 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .status { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .retry { display: none; min-height: 26px; padding: 0 10px; flex: 0 0 auto; }
    .retry.visible { display: inline-flex; align-items: center; }
    form { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 9px; }
    textarea { width: 100%; min-height: 44px; max-height: 110px; resize: none; border: 1px solid var(--line); border-radius: 14px; outline: none; padding: 11px 13px; background: var(--bg); color: var(--text); font: 14px/1.4 Geist, sans-serif; }
    textarea:focus { border-color: color-mix(in srgb, var(--accent) 60%, transparent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 10%, transparent); }
    .send { align-self: end; min-width: 72px; height: 44px; border-color: color-mix(in srgb, var(--accent) 48%, transparent); background: color-mix(in srgb, var(--accent) 13%, transparent); color: var(--text); }
    .send:disabled { opacity: .45; cursor: default; }
  </style>
</head>
<body data-state="arming">
  <header>
    <div class="brand">
      <span class="mark" aria-hidden="true"><i></i><i></i><i></i></span>
      <div style="min-width:0">
        <h1>Sidekick</h1>
        <div class="meta"><span class="dot"></span><span id="state">Arming</span><span>·</span><span class="provider" id="provider">Codex app-server</span><span id="session"></span><span id="screen"></span></div>
      </div>
    </div>
    <button id="stop" type="button">End</button>
  </header>
  <main id="messages">
    <div class="empty" id="empty"><div><strong>Your strategist is joining.</strong><span>It will stay quiet until there is a decision, contradiction, risk, or opening worth surfacing. Ask it anything while the meeting continues.</span></div></div>
    <div class="stream" id="stream"></div>
  </main>
  <footer>
    <div class="status-row">
      <div class="status" id="detail" role="status" aria-live="polite">Starting a persistent Codex Cloud reasoning session…</div>
      <button class="retry" id="retry" type="button">Retry</button>
    </div>
    <form id="form">
      <textarea id="input" rows="1" placeholder="Ask for strategy, a calculation, what to say next…" aria-label="Message Sidekick"></textarea>
      <button class="send" id="send" type="submit">Send</button>
    </form>
  </footer>
  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;
    const stream = document.getElementById('stream');
    const empty = document.getElementById('empty');
    const scroller = document.getElementById('messages');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const retry = document.getElementById('retry');
    let rendered = 0;
    let pendingMessage = '';
    let lastState = 'arming';
    let pendingAcceptance = null;
    let queuedAcceptance = [];
    let latestMessages = [];
    let renderedMessageKeys = [];
    let renderedSessionId = '';
    let lastRevision = -1;

    function intersectRect(left, top, right, bottom, rect) {
      return {
        left: Math.max(left, rect.left),
        top: Math.max(top, rect.top),
        right: Math.min(right, rect.right),
        bottom: Math.min(bottom, rect.bottom),
      };
    }

    function elementInteractability(element) {
      if (!element || !element.isConnected || element.disabled) return null;
      let visibleThroughAncestors = true;
      let clipped = {
        left: 0,
        top: 0,
        right: window.innerWidth,
        bottom: window.innerHeight,
      };
      for (let node = element; node; node = node.parentElement) {
        const style = getComputedStyle(node);
        if (style.display === 'none'
          || style.visibility === 'hidden'
          || Number(style.opacity || '1') <= 0
          || node.inert) {
          visibleThroughAncestors = false;
          break;
        }
        const clipsX = ['auto', 'scroll', 'hidden', 'clip'].includes(style.overflowX);
        const clipsY = ['auto', 'scroll', 'hidden', 'clip'].includes(style.overflowY);
        if (clipsX || clipsY) {
          const ancestorRect = node.getBoundingClientRect();
          clipped = intersectRect(
            clipsX ? clipped.left : 0,
            clipsY ? clipped.top : 0,
            clipsX ? clipped.right : window.innerWidth,
            clipsY ? clipped.bottom : window.innerHeight,
            ancestorRect,
          );
        }
      }
      const rect = element.getBoundingClientRect();
      const intersection = intersectRect(
        clipped.left,
        clipped.top,
        clipped.right,
        clipped.bottom,
        rect,
      );
      const width = Math.max(0, intersection.right - intersection.left);
      const height = Math.max(0, intersection.bottom - intersection.top);
      const centerX = intersection.left + width / 2;
      const centerY = intersection.top + height / 2;
      const hit = width > 0 && height > 0 && typeof document.elementFromPoint === 'function'
        ? document.elementFromPoint(centerX, centerY)
        : element;
      const hitTested = Boolean(hit && (hit === element || element.contains?.(hit)));
      if (document.visibilityState === 'hidden'
        || !visibleThroughAncestors
        || rect.width <= 0
        || rect.height <= 0
        || width <= 0
        || height <= 0
        || !hitTested) return null;
      return { rect, width, height, hitTested };
    }

    function messageRenderKey(message) {
      return JSON.stringify([
        message?.role || '',
        message?.text || '',
        message?.kind || '',
        message?.latencyMs ?? null,
        message?.acceptanceTurnId || '',
      ]);
    }

    function appendMessage(message, snapshotIndex) {
      const item = document.createElement('article');
      item.className = `message ${message.role}`;
      item.dataset.snapshotIndex = String(snapshotIndex);
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = message.role === 'user' ? 'You' : (message.kind || 'Sidekick');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = message.text;
      item.append(label, bubble);
      if (message.latencyMs) {
        const foot = document.createElement('div');
        foot.className = 'foot';
        foot.textContent = `${(message.latencyMs / 1000).toFixed(1)}s · grounded answer`;
        item.append(foot);
      }
      stream.append(item);
      return item;
    }

    function maybeAcknowledgeAcceptance(messages) {
      const pending = pendingAcceptance;
      if (!pending || pending.paintScheduled) return;
      const userIndex = messages.findIndex((message, index) => (
        index >= pending.baselineMessageCount
          && message?.role === 'user'
          && message?.text === pending.message
          && message?.acceptanceTurnId === pending.turnId
      ));
      const responseIndex = messages.findIndex((message, index) => (
        index > userIndex
          && message?.role === 'sidekick'
          && message?.acceptanceTurnId === pending.turnId
      ));
      if (userIndex < 0 || responseIndex < 0) return;
      const response = messages[responseIndex];
      const bubble = stream.querySelector(
        `[data-snapshot-index="${responseIndex}"] .bubble`,
      );
      if (!bubble || bubble.textContent !== response.text) return;
      pending.paintScheduled = true;
      requestAnimationFrame(() => requestAnimationFrame(async () => {
        const interactability = elementInteractability(bubble);
        if (!interactability) {
          pending.paintScheduled = false;
          pending.paintAttempts += 1;
          if (performance.now() < pending.deadlineAt && pending.paintAttempts < 120) {
            requestAnimationFrame(() => maybeAcknowledgeAcceptance(latestMessages));
          } else {
            await failAcceptance(pending, 'The answer never became visible in the Sidekick window.');
          }
          return;
        }
        try {
          await invoke('cmd_native_sidekick_ui_acceptance_painted', {
            nonce: pending.nonce,
            turnId: pending.turnId,
            userText: pending.message,
            domText: bubble.textContent,
            width: interactability.width,
            height: interactability.height,
            animationFrames: 2,
          });
          await invoke('cmd_native_sidekick_ui_acceptance_turn_settled', {
            nonce: pending.nonce,
            turnId: pending.turnId,
          });
          if (pendingAcceptance === pending) {
            pendingAcceptance = null;
            const next = queuedAcceptance.shift();
            if (next) void acceptChallenge(next);
          }
        } catch (error) {
          pending.paintScheduled = false;
          pending.paintAttempts += 1;
          console.error('Sidekick acceptance paint acknowledgement failed', error);
          if (performance.now() < pending.deadlineAt && pending.paintAttempts < 5) {
            requestAnimationFrame(() => maybeAcknowledgeAcceptance(latestMessages));
          } else {
            await failAcceptance(pending, error);
          }
        }
      }));
    }

    async function failAcceptance(pending, error) {
      if (!pending || pending.failed) return;
      pending.failed = true;
      const message = String(error?.message || error || 'Unknown Sidekick UI failure.');
      try {
        await invoke('cmd_native_sidekick_ui_acceptance_failed', {
          nonce: pending.nonce,
          turnId: pending.turnId,
          error: message,
        });
      } catch (reportError) {
        console.error('Could not report Sidekick acceptance failure', reportError);
      } finally {
        if (pendingAcceptance === pending) {
          pendingAcceptance = null;
          queuedAcceptance = queuedAcceptance.filter(
            (candidate) => String(candidate?.turnId || '') !== pending.turnId,
          );
          const next = queuedAcceptance.shift();
          if (next) void acceptChallenge(next);
        }
      }
    }

    function normalizeChallenge(payload) {
      payload = payload || {};
      const nonce = String(payload.nonce || '');
      const turnId = String(payload.turnId || '');
      const message = String(payload.message || '');
      const baselineMessageCount = Number(payload.baselineMessageCount);
      const timeoutMs = Number(payload.timeoutMs || 30_000);
      if (!/^[a-f0-9]{32,128}$/i.test(nonce)
        || !/^[a-zA-Z0-9_-]{1,80}$/.test(turnId)
        || !message.trim()
        || message.length > 2000
        || !Number.isSafeInteger(baselineMessageCount)
        || baselineMessageCount < 0
        || !Number.isFinite(timeoutMs)
        || timeoutMs <= 0
        || timeoutMs > 120_000) return null;
      return {
        nonce,
        turnId,
        message,
        baselineMessageCount,
        shouldSubmit: payload.shouldSubmit !== false,
        deadlineAt: performance.now() + timeoutMs,
        paintScheduled: false,
        paintAttempts: 0,
        failed: false,
      };
    }

    async function acceptChallenge(payload) {
      const pending = normalizeChallenge(payload);
      if (!pending) return;
      if (pendingAcceptance) {
        if (pendingAcceptance.turnId !== pending.turnId
          && !queuedAcceptance.some((candidate) => (
            String(candidate?.turnId || '') === pending.turnId
          ))) queuedAcceptance.push(payload);
        return;
      }
      // Reserve synchronously before the first await. A reload can deliver
      // both the event and the authoritative ready-state replay in the same
      // task; neither is allowed to submit the same turn twice.
      pendingAcceptance = pending;
      try {
        if (pending.shouldSubmit) {
          const claimed = await invoke('cmd_native_sidekick_ui_acceptance_claim', {
            nonce: pending.nonce,
            turnId: pending.turnId,
            message: pending.message,
            baselineMessageCount: pending.baselineMessageCount,
          });
          if (!claimed) {
            pendingAcceptance = null;
            return;
          }
        }
        if (pending.shouldSubmit) {
          const inputAck = elementInteractability(input);
          const sendAck = elementInteractability(send);
          if (!inputAck || !sendAck) {
            throw new Error('The Sidekick input or Send control is not visibly interactable.');
          }
          const inputWritable = !input.readOnly && !input.inert && !input.closest?.('[inert]');
          const sendWritable = !send.inert && !send.closest?.('[inert]');
          if (!inputWritable || !sendWritable) {
            throw new Error('The Sidekick input or Send control is not writable.');
          }
          await invoke('cmd_native_sidekick_ui_acceptance_interactable', {
            nonce: pending.nonce,
            turnId: pending.turnId,
            target: 'sidekick_input',
            width: inputAck.width,
            height: inputAck.height,
            hitTested: inputAck.hitTested,
            enabled: !input.disabled,
            writable: inputWritable,
          });
          await invoke('cmd_native_sidekick_ui_acceptance_interactable', {
            nonce: pending.nonce,
            turnId: pending.turnId,
            target: 'sidekick_send',
            width: sendAck.width,
            height: sendAck.height,
            hitTested: sendAck.hitTested,
            enabled: !send.disabled,
            writable: sendWritable,
          });
          input.value = pending.message;
          input.focus();
          send.click();
        } else {
          maybeAcknowledgeAcceptance(latestMessages);
        }
      } catch (error) {
        await failAcceptance(pending, error);
      }
    }

    function render(snapshot) {
      snapshot = snapshot || {};
      const revision = Number(snapshot.revision);
      if (Number.isSafeInteger(revision)) {
        if (revision < lastRevision) return;
        lastRevision = revision;
      }
      const nextState = snapshot.state || 'off';
      document.body.dataset.state = snapshot.state || 'off';
      document.getElementById('state').textContent = nextState;
      document.getElementById('provider').textContent = [snapshot.provider, snapshot.privacy].filter(Boolean).join(' · ');
      const sessionId = snapshot.session_id || snapshot.sessionId || '';
      const sessionType = snapshot.session_type || snapshot.sessionType || '';
      document.getElementById('session').textContent = sessionId
        ? `· ${sessionType || 'session'} ${String(sessionId).slice(0, 8)}`
        : '';
      document.getElementById('screen').textContent = snapshot.screenAvailable ? '· screen' : '';
      document.getElementById('detail').textContent = snapshot.detail || '';
      send.disabled = !snapshot.active || nextState === 'arming';
      const messages = Array.isArray(snapshot.messages) ? snapshot.messages : [];
      latestMessages = messages;
      const nextMessageKeys = messages.map(messageRenderKey);
      // Starting a new exact session replaces the backend snapshot. Mirror the
      // reset instead of leaving messages from the prior meeting on screen.
      const prefixChanged = renderedMessageKeys.some((key, index) => nextMessageKeys[index] !== key);
      if (sessionId !== renderedSessionId || messages.length < rendered || prefixChanged) {
        stream.replaceChildren();
        rendered = 0;
        renderedMessageKeys = [];
      }
      renderedSessionId = sessionId;
      while (rendered < messages.length) {
        appendMessage(messages[rendered], rendered);
        renderedMessageKeys.push(nextMessageKeys[rendered]);
        rendered += 1;
      }
      empty.hidden = rendered > 0;
      const latestMessage = messages.at(-1);
      if (!pendingMessage && nextState === 'degraded' && latestMessage?.role === 'user') {
        // The window may have reloaded after the backend accepted the text but
        // before the turn failed. Recover the unanswered text from the
        // authoritative snapshot so Retry never depends on webview memory.
        pendingMessage = String(latestMessage.text || '');
      }
      if (pendingMessage && nextState === 'ready' && lastState === 'thinking') {
        pendingMessage = '';
      }
      const failedPendingTurn = Boolean(pendingMessage) && nextState === 'degraded';
      retry.classList.toggle('visible', failedPendingTurn);
      if (failedPendingTurn && !input.value.trim()) input.value = pendingMessage;
      lastState = nextState;
      maybeAcknowledgeAcceptance(messages);
      requestAnimationFrame(() => { scroller.scrollTop = scroller.scrollHeight; });
    }

    function showSubmitError(message, error) {
      pendingMessage = message;
      if (!input.value.trim()) input.value = message;
      document.body.dataset.state = 'degraded';
      document.getElementById('state').textContent = 'degraded';
      document.getElementById('detail').textContent = `Message not delivered: ${String(error?.message || error || 'Sidekick is unavailable.')}`;
      retry.classList.toggle('visible', Boolean(message));
      input.focus();
    }

    async function submitMessage(message) {
      pendingMessage = message;
      retry.classList.remove('visible');
      try {
        await invoke('cmd_native_sidekick_send', { message });
        input.value = '';
      } catch (error) {
        showSubmitError(message, error);
        const acceptance = pendingAcceptance;
        if (acceptance?.message === message && acceptance.shouldSubmit) {
          await failAcceptance(acceptance, error);
        }
      }
    }

    document.getElementById('form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      await submitMessage(message);
    });
    retry.addEventListener('click', () => {
      const message = (input.value.trim() || pendingMessage).trim();
      if (message) submitMessage(message);
    });
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        document.getElementById('form').requestSubmit();
      }
    });
    document.getElementById('stop').addEventListener('click', async () => {
      await invoke('cmd_stop_native_sidekick');
      window.__TAURI__.window.getCurrentWindow().close();
    });

    async function bootstrap() {
      await listen('sidekick:state', (event) => render(event.payload));
      await listen('sidekick:acceptance-submit', (event) => acceptChallenge(event.payload));
      const snapshot = await invoke('cmd_native_sidekick_status');
      render(snapshot);
      const acceptance = await invoke('cmd_native_sidekick_ui_acceptance_ready');
      if (acceptance?.pending) await acceptChallenge(acceptance.pending);
      input.focus();
    }

    bootstrap().catch((error) => {
      showSubmitError(input.value.trim(), error);
    });
  </script>
</body>
</html>
